kind = "web"
previewPath = "/"
title = "منصة كلية تقنية المعلومات"
version = "1.0.0"
id = "artifacts/college-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24533

[services.development]
run = "pnpm --filter @workspace/college-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-platform", "run", "build" ]
publicDir = "artifacts/college-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24533"
BASE_PATH = "/"
